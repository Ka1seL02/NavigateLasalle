<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigate La Salle - Admin</title>
    <!-- Global Styles -->
    <link rel="stylesheet" href="../shared/css/root.css">
    <link rel="stylesheet" href="../shared/css/s_notification.css">
    <link rel="stylesheet" href="../shared/css/s_modal.css">
    <!-- Admin Page Styles -->
    <link rel="stylesheet" href="css/a_global.css">
    <link rel="stylesheet" href="css/a_interactive_map.css">
    <!-- Boxicons -->
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
</head>

<body>
    <main>
        <div class="breadcrumb">
            <div class="profile-section">
                <div class="profile-initials">AB</div>
                <div class="profile-info">
                    <span class="profile-name">Alice Brown</span>
                    <small class="profile-role">Super Admin</small>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="content-header">
                <div>
                    <h2>Interactive Map</h2>
                    <p>Manage campus locations and buildings</p>
                </div>
                <div class="header-actions">
                    <button class="btn-secondary" id="viewMapBtn">
                        <i class='bx bx-show'></i>
                        View Map
                    </button>
                    <button class="btn-primary" id="addBuildingBtn">
                        <i class='bx bx-plus'></i>
                        Add Location
                    </button>
                </div>
            </div>

            <!-- Map Editor View -->
            <div class="map-editor-view" id="mapEditorView" style="display: none;">
                <div class="editor-toolbar">
                    <button class="tool-btn" id="selectModeBtn" data-mode="select">
                        <i class='bx bx-pointer'></i>
                        Select
                    </button>
                    <button class="tool-btn" id="moveModeBtn" data-mode="move">
                        <i class='bx bx-move'></i>
                        Move
                    </button>
                    <button class="tool-btn" id="addRectBtn" data-mode="add-rect">
                        <i class='bx bx-rectangle'></i>
                        Add Rectangle
                    </button>
                    <button class="tool-btn" id="addEllipseBtn" data-mode="add-ellipse">
                        <i class='bx bx-circle'></i>
                        Add Ellipse
                    </button>
                    <div class="toolbar-divider"></div>
                    <button class="tool-btn" id="closeEditorBtn">
                        <i class='bx bx-x'></i>
                        Close Editor
                    </button>
                </div>

                <div class="map-canvas-container">
                    <svg id="adminCampusMap" viewBox="0 0 1920 1080"></svg>

                    <!-- Shape Controls (appears when creating/editing shape) -->
                    <div class="shape-controls" id="shapeControls" style="display: none;">
                        <h3>Shape Properties</h3>
                        <div class="control-group">
                            <label>Width</label>
                            <input type="number" id="shapeWidth" min="10" max="500" />
                        </div>
                        <div class="control-group">
                            <label>Height</label>
                            <input type="number" id="shapeHeight" min="10" max="500" />
                        </div>
                        <div class="control-group">
                            <label>Rotation (degrees)</label>
                            <input type="number" id="shapeRotation" min="-180" max="180" step="1" value="0" />
                        </div>
                        <button class="btn-primary" id="saveShapeBtn">Save Shape</button>
                        <button class="btn-secondary" id="cancelShapeBtn">Cancel</button>
                    </div>
                </div>
            </div>

            <!-- Buildings List View -->
            <div class="buildings-list-view" id="buildingsListView">
                <div class="list-controls">
                    <input type="text" class="search-input" id="searchBuildings" placeholder="Search locations...">
                    <select class="filter-select" id="filterType">
                        <option value="">All Types</option>
                        <option value="academic">Academic</option>
                        <option value="facility">Facility</option>
                        <option value="administrative">Administrative</option>
                        <option value="security">Security</option>
                        <option value="learning-space">Learning Space</option>
                        <option value="chapel">Chapel</option>
                        <option value="parking">Parking</option>
                    </select>
                    <select class="filter-select" id="filterSection">
                        <option value="">All Sections</option>
                        <option value="east">East</option>
                        <option value="west">West</option>
                    </select>
                </div>

                <div class="buildings-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Code</th>
                                <th>Name</th>
                                <th>Type</th>
                                <th>Section</th>
                                <th>Images</th>
                                <th>Offices</th>
                                <th>Departments</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="buildingsTableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Edit Building Modal -->
    <div class="modal-overlay" id="editBuildingModal">
        <div class="modal modal-large">
            <div class="modal-header">
                <h2>Edit Location</h2>
                <button class="modal-close" onclick="closeModal('editBuildingModal')">
                    <i class='bx bx-x'></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="editBuildingForm">
                    <input type="hidden" id="editBuildingId">

                    <!-- Basic Info -->
                    <div class="form-section">
                        <h3>Basic Information</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Code *</label>
                                <input type="text" id="editCode" required maxlength="10">
                            </div>
                            <div class="form-group">
                                <label>Type *</label>
                                <select id="editType" required>
                                    <option value="academic">Academic</option>
                                    <option value="facility">Facility</option>
                                    <option value="administrative">Administrative</option>
                                    <option value="security">Security</option>
                                    <option value="learning-space">Learning Space</option>
                                    <option value="chapel">Chapel</option>
                                    <option value="parking">Parking</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Section</label>
                                <select id="editSection">
                                    <option value="">None</option>
                                    <option value="east">East</option>
                                    <option value="west">West</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Name *</label>
                            <input type="text" id="editName" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="editDescription" rows="3"></textarea>
                        </div>
                    </div>

                    <!-- Images Section -->
                    <div class="form-section">
                        <h3>Images</h3>
                        <div class="image-gallery" id="editImageGallery">
                            <!-- Populated by JS -->
                        </div>
                        <button type="button" class="btn-secondary" id="addImageBtn">
                            <i class='bx bx-plus'></i>
                            Add Image
                        </button>
                        <input type="file" id="imageUploadInput" accept="image/*" style="display: none;">
                    </div>

                    <!-- Offices Section -->
                    <div class="form-section">
                        <h3>Offices</h3>
                        <div id="officesList">
                            <!-- Populated by JS -->
                        </div>
                        <button type="button" class="btn-secondary" id="addOfficeBtn">
                            <i class='bx bx-plus'></i>
                            Add Office
                        </button>
                    </div>

                    <!-- Departments Section -->
                    <div class="form-section">
                        <h3>Departments</h3>
                        <div id="departmentsList">
                            <!-- Populated by JS -->
                        </div>
                        <button type="button" class="btn-secondary" id="addDepartmentBtn">
                            <i class='bx bx-plus'></i>
                            Add Department
                        </button>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn-secondary"
                            onclick="closeModal('editBuildingModal')">Cancel</button>
                        <button type="submit" class="btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/a_global.js"></script>
    <script>protectPage();</script>
    <script src="../shared/js/s_notification.js"></script>
    <script src="js/a_interactive_map.js"></script>

</body>

</html>
