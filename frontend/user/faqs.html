<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigate La Salle</title>
    <!-- Global styles -->
    <link rel="stylesheet" href="/shared/css/root.css">
    <link rel="stylesheet" href="/shared/css/loading.css">
    <!-- Specific page style and other resources -->
    <link rel="stylesheet" href="css/faqs.css">
    <link rel="stylesheet" href="css/feedback.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
</head>

<body>

    <!-- Top Bar -->
    <header class="top-bar">
        <div class="top-bar-left">
            <button class="back-btn" id="backBtn">
                <i class='bx bx-chevron-left'></i>
            </button>
            <img src="img/dlsud-logo.png" alt="DLSU-D" class="school-logo" />
            <div class="school-name">
                <span class="school-name-top">De La Salle University</span>
                <span class="school-name-bottom">DASMARIÑAS</span>
            </div>
        </div>
        <div class="top-bar-right">
            <div class="live-clock">
                <span class="clock-time" id="clockTime"></span>
                <span class="clock-date" id="clockDate"></span>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="faqs-main">

        <!-- Header + Search -->
        <div class="faqs-header">
            <div class="faqs-header-left">
                <h1 class="faqs-page-title">Frequently Asked Questions</h1>
                <p class="faqs-page-subtitle">Find answers to common questions about the campus.</p>
            </div>
            <div class="search-bar">
                <i class='bx bx-search'></i>
                <input type="text" id="searchInput" placeholder="Search questions..." />
            </div>
        </div>

        <!-- FAQ List -->
        <div id="faqList"></div>

    </main>

    <script type="module" src="js/faqs.js"></script>
    <script src="js/feedback.js"></script>
</body>

</html>
