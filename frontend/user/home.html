<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigate La Salle</title>
    <!-- Global styles -->
    <link rel="icon" href="/shared/img/system_icon.png">
    <link rel="stylesheet" href="/shared/css/root.css">
    <link rel="stylesheet" href="/shared/css/loading.css">
    <!-- Specific page style and other resources -->
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/feedback.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
</head>

<body>
    <!-- Background -->
    <div class="bg-overlay"></div>
    <img class="bg-image" src="img/home_bg.jpg" alt="Campus" />

    <!-- Top Bar -->
    <header class="top-bar">
        <div class="top-bar-left">
            <img src="img/dlsud-logo.png" alt="DLSU-D" class="school-logo" />
            <div class="school-name">
                <span class="school-name-top">De La Salle University</span>
                <span class="school-name-bottom">DASMARIÑAS</span>
            </div>
        </div>
        <div class="top-bar-right">
            <div class="live-clock">
                <span class="clock-time" id="clockTime"></span>
                <span class="clock-date" id="clockDate"></span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-grid">

        <!-- Left — News Carousel -->
        <section class="news-panel glass-panel">
            <div class="news-carousel" id="newsCarousel">
                <div class="news-loading">
                    <i class='bx bx-loader-alt bx-spin'></i>
                </div>
            </div>
            <div class="news-carousel-nav">
                <button class="carousel-arrow left" id="carouselPrev">
                    <i class='bx bx-chevron-left'></i>
                </button>
                <div class="carousel-dots" id="carouselDots"></div>
                <button class="carousel-arrow right" id="carouselNext">
                    <i class='bx bx-chevron-right'></i>
                </button>
            </div>
            <a class="view-more-news" href="news.html">
                View More News <i class='bx bx-right-arrow-alt'></i>
            </a>
        </section>

        <!-- Right — Widgets -->
        <section class="right-panel">

            <!-- Weather -->
            <div class="weather-widget glass-panel">
                <div class="weather-left">
                    <div class="weather-temp" id="weatherTemp">--°C</div>
                    <div class="weather-desc" id="weatherDesc">Loading...</div>
                    <div class="weather-humidity" id="weatherHumidity"></div>
                </div>
                <div class="weather-right">
                    <img class="weather-icon" id="weatherIcon" src="" alt="Weather" />
                    <div class="weather-city" id="weatherCity"></div>
                </div>
            </div>

            <!-- Quick Access Grid -->
            <div class="quick-access-grid">
                <a href="map.html" class="quick-access-btn glass-panel">
                    <i class='bx bx-map-alt'></i>
                    <span>Interactive Map</span>
                </a>
                <a href="campus-info.html" class="quick-access-btn glass-panel">
                    <i class='bx bx-buildings'></i>
                    <span>Learn about the Campus</span>
                </a>
                <a href="virtual-tour.html" class="quick-access-btn glass-panel">
                    <i class='bx bx-rotate-right'></i>
                    <span>Virtual Tour</span>
                </a>
                <a href="faqs.html" class="quick-access-btn glass-panel">
                    <i class='bx bx-question-mark'></i>
                    <span>FAQs</span>
                </a>
            </div>

        </section>

    </main>

    <script type="module" src="js/home.js"></script>
    <script src="js/feedback.js"></script>
</body>

</html>
