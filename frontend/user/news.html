<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigate La Salle</title>
    <!-- Global styles -->
    <link rel="stylesheet" href="/shared/css/root.css">
    <link rel="stylesheet" href="/shared/css/loading.css">
    <!-- Specific page style and other resources -->
    <link rel="stylesheet" href="css/news.css">
    <link rel="stylesheet" href="css/feedback.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
</head>

<body>

    <!-- Top Bar -->
    <header class="top-bar">
        <div class="top-bar-left">
            <a href="home.html" class="back-btn">
                <i class='bx bx-chevron-left'></i>
            </a>
            <img src="img/dlsud-logo.png" alt="DLSU-D" class="school-logo" />
            <div class="school-name">
                <span class="school-name-top">De La Salle University</span>
                <span class="school-name-bottom">DASMARIÑAS</span>
            </div>
        </div>
        <div class="top-bar-right">
            <div class="live-clock">
                <span class="clock-time" id="clockTime"></span>
                <span class="clock-date" id="clockDate"></span>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="news-main">

        <!-- Page Title + Filters -->
        <div class="news-header">
            <h1 class="news-page-title">News & Announcements</h1>
            <div class="news-filters">
                <select id="typeFilter" class="filter-select">
                    <option value="">All Types</option>
                    <option value="news">News</option>
                    <option value="announcement">Announcement</option>
                    <option value="event">Event</option>
                </select>
                <select id="monthFilter" class="filter-select">
                    <option value="">All Months</option>
                    <option value="1">January</option>
                    <option value="2">February</option>
                    <option value="3">March</option>
                    <option value="4">April</option>
                    <option value="5">May</option>
                    <option value="6">June</option>
                    <option value="7">July</option>
                    <option value="8">August</option>
                    <option value="9">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                </select>
                <select id="yearFilter" class="filter-select">
                    <option value="">All Years</option>
                </select>
            </div>
        </div>

        <!-- Posts grouped by date -->
        <div id="newsList"></div>

    </main>

    <script type="module" src="js/news.js"></script>
    <script src="js/feedback.js"></script>
</body>

</html>
