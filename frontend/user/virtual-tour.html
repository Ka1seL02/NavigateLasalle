<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navigate La Salle</title>
    <link rel="icon" href="/shared/img/system_icon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Grenze:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Gupter:wght@400;500;700&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- SIDEBAR LATCH (OPEN) -->
    <div id="sidebar-latch" onclick="toggleNav()">
      <img id="icon-latch" src="" alt="Open Sidebar" />
    </div>

    <!-- SIDEBAR -->
    <div class="side-nav collapsed" id="side-nav">
      <!-- Logo -->
      <div class="nav-logo">
        <img id="sidebar-logo" src="" class="logo logo-expanded" alt="Logo" />
        <img
          id="sidebar-logo-collapsed"
          src=""
          class="logo logo-collapsed"
          alt="Logo"
        />
      </div>

      <!-- Divider 1: below logo -->
      <div class="line-separator"></div>

      <!-- Navigation Menu -->
      <div class="nav-item-container">
        <div
          class="nav-item-row"
          id="buildings"
          onclick="toggleSubmenu('buildings')"
        >
          <div class="nav-item">
            <span class="nav-icon-col"
              ><img
                id="icon-buildings"
                src=""
                alt="Building Icon"
                class="nav-icon"
            /></span>
            <span class="nav-text-col">Buildings</span>
          </div>
        </div>
        <div
          class="nav-item-row"
          id="facilities"
          onclick="toggleSubmenu('facilities')"
        >
          <div class="nav-item">
            <span class="nav-icon-col"
              ><img
                id="icon-facilities"
                src=""
                alt="Facilities Icon"
                class="nav-icon"
            /></span>
            <span class="nav-text-col">Facilities</span>
          </div>
        </div>
        <div
          class="nav-item-row"
          id="landmarks"
          onclick="toggleSubmenu('landmarks')"
        >
          <div class="nav-item">
            <span class="nav-icon-col"
              ><img
                id="icon-landmarks"
                src=""
                alt="Landmarks Icon"
                class="nav-icon"
            /></span>
            <span class="nav-text-col">Landmarks</span>
          </div>
        </div>
        <div class="nav-item-row" id="gates" onclick="toggleSubmenu('gates')">
          <div class="nav-item">
            <span class="nav-icon-col"
              ><img id="icon-gates" src="" alt="Gates Icon" class="nav-icon"
            /></span>
            <span class="nav-text-col">Gates</span>
          </div>
        </div>
        <div
          class="nav-item-row"
          id="parking"
          onclick="toggleSubmenu('parking')"
        >
          <div class="nav-item">
            <span class="nav-icon-col"
              ><img
                id="icon-parking"
                src=""
                alt="Parking Icon"
                class="nav-icon"
            /></span>
            <span class="nav-text-col">Parking</span>
          </div>
        </div>
      </div>

      <!-- Divider 2: below nav items -->
      <div class="line-separator"></div>

      <!-- Spacer pushes bottom section down -->
      <div class="sidebar-spacer"></div>

      <!-- FUNCTION BUTTONS -->
      <div class="function-buttons">
        <button id="narrative-btn" class="function-btn" title="Audio">
          <img src="" id="icon-narrative" />
        </button>
        <button id="video-btn" class="function-btn" title="Video">
          <img src="" id="icon-video" />
        </button>
        <button id="music-btn" class="function-btn" title="Ambiance">
          <img src="" id="icon-bgm" />
        </button>
      </div>

      <!-- DASHBOARD BUTTON -->
      <div class="widget" id="go-back">
        <span class="nav-icon-col"
          ><img class="nav-icon" id="dashboard-icon" src="" alt="Dashboard"
        /></span>
        <span class="nav-text-col" id="dashboard-label"></span>
      </div>

      <!-- Bottom divider -->
      <div class="line-separator"></div>

      <!-- Sidebar control -->
      <div class="sidebar-control">
        <div class="sb-control-inner">
          <button
            id="sidebar-control-btn"
            class="sb-control-icon-btn"
            title="Sidebar Control"
          >
            <img id="icon-sidebar-control" src="" alt="Sidebar Control" />
            <div class="sb-control-menu" id="sb-control-menu">
              <p class="sb-control-title">Sidebar Control</p>
              <div class="sb-control-divider"></div>
              <div class="sb-control-option" id="sb-opt-expanded">Expanded</div>
              <div class="sb-control-option" id="sb-opt-collapsed">
                Collapsed
              </div>
            </div>
          </button>
        </div>
      </div>
    </div>

    <!-- EXTENDED SIDEBAR (submenus populated by JS from Scenes API) -->
    <div class="extended-sidebar">
      <div class="extended-menu" id="buildings-submenu" style="display: none">
        <h3 class="submenu-title">East</h3>
        <div class="divider"></div>
        <div id="buildings-east-list"></div>
        <br />
        <h3 class="submenu-title">West</h3>
        <div class="divider"></div>
        <div id="buildings-west-list"></div>
      </div>

      <div class="extended-menu" id="facilities-submenu" style="display: none">
        <h3 class="submenu-title">East</h3>
        <div class="divider"></div>
        <div id="facilities-east-list"></div>
        <br />
        <h3 class="submenu-title">West</h3>
        <div class="divider"></div>
        <div id="facilities-west-list"></div>
      </div>

      <div class="extended-menu" id="landmarks-submenu" style="display: none">
        <h3 class="submenu-title">East</h3>
        <div class="divider"></div>
        <div id="landmarks-east-list"></div>
        <br />
        <h3 class="submenu-title">West</h3>
        <div class="divider"></div>
        <div id="landmarks-west-list"></div>
      </div>

      <div class="extended-menu" id="gates-submenu" style="display: none">
        <h3 class="submenu-title">East</h3>
        <div class="divider"></div>
        <div id="gates-east-list"></div>
        <br />
        <h3 class="submenu-title">West</h3>
        <div class="divider"></div>
        <div id="gates-west-list"></div>
      </div>

      <div class="extended-menu" id="parking-submenu" style="display: none">
        <h3 class="submenu-title">East</h3>
        <div class="divider"></div>
        <div id="parking-east-list"></div>
        <br />
        <h3 class="submenu-title">West</h3>
        <div class="divider"></div>
        <div id="parking-west-list"></div>
      </div>
    </div>

    <!-- ===================== MODALS ===================== -->

    <!-- Welcome Modal (content populated by JS from Settings) -->
    <div id="welcome-box" class="welcome-overlay" style="display: none">
      <div class="welcome-content">
        <img id="welcome-logo" src="" alt="Logo" class="welcome-logo" />
        <h1 id="welcome-title"></h1>
        <h3 id="welcome-subtitle"></h3>
        <div id="welcome-description" class="welcome-description"></div>
        <button id="start-tour-btn"></button>
      </div>
    </div>

    <!-- Video Modal (src populated by JS from Settings) -->
    <div id="video-overlay" class="video-overlay">
      <button id="close-video-btn" class="close-btn">
        <img src="" id="icon-video-close" alt="Close" />
      </button>
      <div class="video-container">
        <video id="video-player" controls>
          <source id="video-source" src="" type="video/mp4" />
          Your browser does not support the video tag.
        </video>
      </div>
    </div>

    <!-- Info Modal (content populated by JS from Scenes API on marker click) -->
    <div
      id="building-info-box"
      class="welcome-overlay"
      style="display: none; opacity: 0; visibility: hidden"
    >
      <div class="welcome-content building-info-content">
        <h2 id="building-info-title"></h2>
        <p class="indented" id="building-info-desc"></p>
        <div class="button-container">
          <div class="info-buttons">
            <button id="view-gallery-btn" title="View Gallery">
              <img src="" id="icon-info-gallery" alt="Gallery" />
            </button>
            <button id="audio-btn" title="Toggle Audio">
              <img src="" id="icon-info-audio" alt="Audio Button" />
            </button>
          </div>
          <div class="close-btn-container">
            <button id="building-info-close">
              <img src="" id="icon-info-close" alt="Close" />
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Gallery Modal -->
    <div id="gallery-modal" class="welcome-overlay" style="display: none">
      <div class="welcome-content gallery-content">
        <div id="gallery-slider">
          <button class="nav-button" id="prev-image">&#10094;</button>
          <img id="gallery-current-img" src="" alt="Gallery Image" />
          <button class="nav-button" id="next-image">&#10095;</button>
        </div>
        <div id="gallery-images"></div>
        <button id="close-gallery" class="close-gallery-btn">Close</button>
      </div>
    </div>

    <!-- Viewer Container -->
    <div id="viewer"></div>

    <script type="module" src="./js/sidebar-vt.js"></script>
    <script type="module" src="./js/modals-vt.js"></script>
    <script type="module" src="./js/virtual-tour.js"></script>
  </body>
</html>
