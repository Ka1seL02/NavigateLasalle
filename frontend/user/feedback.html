<!-- FAB -->
<button class="feedback-fab" id="feedbackFab">
    <i class='bx bx-comment-dots'></i>
    <span>Give Feedback</span>
</button>

<!-- Modal -->
<div class="feedback-modal-overlay" id="feedbackModalOverlay">
    <div class="feedback-modal">
        <button class="feedback-modal-close" id="feedbackModalClose">
            <i class='bx bx-x'></i>
        </button>

        <div id="feedbackModalContent">
            <div class="feedback-modal-header">
                <h2 class="feedback-modal-title">Share your Feedback</h2>
                <p class="feedback-modal-subtitle">Help us improve your kiosk experience.</p>
            </div>

            <!-- Stars -->
            <span class="feedback-rating-label">Rating <span style="color:var(--red)">*</span></span>
            <div class="feedback-stars" id="feedbackStars">
                <button class="feedback-star" data-value="1"><i class='bx bxs-star'></i></button>
                <button class="feedback-star" data-value="2"><i class='bx bxs-star'></i></button>
                <button class="feedback-star" data-value="3"><i class='bx bxs-star'></i></button>
                <button class="feedback-star" data-value="4"><i class='bx bxs-star'></i></button>
                <button class="feedback-star" data-value="5"><i class='bx bxs-star'></i></button>
            </div>

            <!-- Comment -->
            <span class="feedback-comment-label">
                Comment <span class="feedback-comment-optional">(optional)</span>
            </span>
            <textarea
                class="feedback-textarea"
                id="feedbackComment"
                placeholder="Tell us about your experience...">
            </textarea>

            <!-- Submit -->
            <button class="feedback-submit-btn" id="feedbackSubmitBtn">
                Submit Feedback
            </button>
        </div>
    </div>
</div>
