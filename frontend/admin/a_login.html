<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigate La Salle</title>
    <!-- Global Style -->
    <link rel="stylesheet" href="../shared/css/root.css">
    <!-- Specific Page Style -->
    <link rel="stylesheet" href="css/a_login.css">
    <!-- Boxicons -->
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
</head>

<body>
    <div class="form-section">
        <div class="system-brand">
            <img src="img/a_logo.png">
            <span>Navigate La Salle</span>
        </div>

        <div class="login-header">
            <h1>Holla,<br>Welcome Back!</h1>
            <p>Sign in to your admin account to continue.</p>
        </div>

        <form id="loginForm">
            <div class="input-field">
                <input type="text" id="username" placeholder="Username" />
            </div>

            <div class="input-field">
                <input type="password" id="password" placeholder="Password" />
                <i class='bx bx-hide toggle-password' id="togglePassword"></i>
            </div>
            <a href="a_forgot-password.html" class="forgot-link">Forgot Password?</a>

            <button type="submit" class="login-btn">Login</button>
        </form>

    </div>
    <div class="image-section"></div>
</body>

</html>
