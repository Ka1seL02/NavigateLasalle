<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigate La Salle</title>
    <!-- Global styles -->
    <link rel="icon" href="/shared/img/system_icon.png">
    <link rel="stylesheet" href="/shared/css/root.css">
    <link rel="stylesheet" href="/shared/css/loading.css">
    <!-- Specific page style and other resources -->
    <link rel="stylesheet" href="css/forgot-password.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
</head>

<body>
    <div class="image-section"></div>

    <div class="form-section">
        <div class="form-content">
            <div class="brand">
                <img src="img/brand.png" alt="Navigate La Salle Logo">
                <span>Navigate La Salle</span>
            </div>

            <div class="forgot-header">
                <h1>Forgot your<br>Password?</h1>
                <p>Enter your email address and we'll send you a link to reset your password.</p>
            </div>

            <form id="forgotPasswordForm">
                <div class="form-group">
                    <input type="email" id="email" placeholder=" " required>
                    <label for="email">Email</label>
                </div>
                <button type="submit" class="send-link-btn">Send</button>
                <a href="login.html" class="back-link"><i class="bx bx-chevron-left"></i>Back to Login</a>
            </form>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal-overlay hidden" id="successModalOverlay">
        <div class="modal">
            <div class="modal-icon">
                <svg viewBox="0 0 24 24" fill="none" width="24" height="24">
                    <path d="M5 13l4 4L19 7" stroke="var(--light-green)" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h2>Email Sent!</h2>
            <p>If an account with that email address exists, a password reset link has been sent.</p>
            <button class="close-btn">Close</button>
        </div>
    </div>

    <script type="module" src="js/forgot-password.js"></script>
</body>

</html>
