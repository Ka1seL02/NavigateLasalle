<!-- Logout Modal -->
<div class="modal-overlay hidden" id="logoutModalOverlay">
    <div class="modal" id="logoutModal">
        <div class="modal-icon">
            <svg viewBox="0 0 24 24" fill="none" width="24" height="24">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" 
                stroke="var(--red)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h2>Confirm Logout</h2>
        <p>Are you sure you want to logout?</p>
        <div class="modal-btns">
            <button class="logout-cancel-btn" id="cancelLogout">Cancel</button>
            <button class="logout-confirm-btn" id="confirmLogout">Logout</button>
        </div>
    </div>
</div>

<!-- Inactivity Modal -->
<div class="modal-overlay hidden" id="inactiveModalOverlay">
    <div class="modal" id="inactiveModal">
        <div class="modal-icon">
            <svg viewBox="0 0 24 24" fill="none" width="24" height="24">
                <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" 
                stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h2>Session Expired</h2>
        <p>You have been logged out due to inactivity.</p>
        <button class="inactive-close-btn" id="inactiveOkBtn">Ok</button>
    </div>
</div>
