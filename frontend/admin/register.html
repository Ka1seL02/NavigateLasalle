<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigate La Salle</title>
    <!-- Global styles -->
    <link rel="stylesheet" href="/shared/css/root.css">
    <link rel="stylesheet" href="/shared/css/loading.css">
    <!-- Page specific -->
    <link rel="stylesheet" href="css/register.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
</head>

<body>
    <div class="form-section">
        <div class="form-content">
            <div class="brand">
                <img src="img/brand.png" alt="Navigate La Salle Logo">
                <span>Navigate La Salle</span>
            </div>

            <div class="register-header">
                <h1>Create an Admin Account</h1>
                <p>Fill in the details below to create a new admin account.</p>
            </div>

            <form id="createAccountForm">
                <div class="form-group">
                    <input type="text" id="name" placeholder=" " required>
                    <label for="name">Name</label>
                </div>
                <div class="form-group">
                    <input type="email" id="email" placeholder=" " required>
                    <label for="email">Email</label>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder=" ">
                    <label for="password">Password</label>
                    <i class='bx bx-hide toggle-password' id="togglePassword"></i>
                </div>
                <div class="password-rules">
                    <p>Please add all necessary characters to create a strong password.</p>
                    <ul>
                        <li>Minimum 8 characters</li>
                        <li>One uppercase letter</li>
                        <li>One lowercase letter</li>
                        <li>One special character</li>
                        <li>One number</li>
                    </ul>
                </div>
                <div class="form-group">
                    <input type="password" id="confirmPassword" placeholder=" ">
                    <label for="confirmPassword">Confirm Password</label>
                    <i class='bx bx-hide toggle-password' id="togglePassword"></i>
                </div>
                <button type="submit" class="register-btn">Create Account</button>
            </form>
        </div>
    </div>

    <div class="image-section"></div>
</body>

</html>
