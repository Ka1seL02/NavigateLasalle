<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigate La Salle</title>
    <!-- Global Style -->
    <link rel="stylesheet" href="../shared/css/root.css">
    <!-- Specific Page Style -->
    <link rel="stylesheet" href="css/a_sidebar.css">
    <link rel="stylesheet" href="css/a_accounts.css">
    <!-- Boxicons -->
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
</head>

<body>
    <div id="sidebar-container"></div>

    <main>
        <h1 class="page-title">
            Accounts
            <span class="page-count" id="accountsCount">999+</span>
        </h1>
        <div class="main-content">
            <div class="accounts-toolbar">
                <div class="search-bar">
                    <i class='bx bx-search'></i>
                    <input type="text" id="searchInput" placeholder="Search by name or email..." />
                </div>

                <button class="invite-btn hidden" id="inviteBtn">
                    <i class='bx bx-paper-plane'></i>Invite
                </button>
            </div>

            <!-- Accounts Table -->
            <div class="table-wrapper">
                <table id="accountListTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="accountListBody">
                        <!-- Dynamic account rows will be inserted here -->
                        <tr>
                            <td>Juan Dela Cruz</td>
                            <td>juan****@gmail.com</td>
                            <td><span class="role-badge admin">Admin</span></td>
                            <td>Apr 5, 2026, 10:30 AM</td>
                            <td>
                                <button class="delete-btn"><i class='bx bx-trash'></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td>Super Admin</td>
                            <td>navi****@gmail.com</td>
                            <td><span class="role-badge superadmin">Super Admin</span></td>
                            <td>Apr 6, 2026, 9:00 AM</td>
                            <td>
                                <button class="delete-btn"><i class='bx bx-trash'></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination">
                <span class="pagination-info">
                    Showing <span id="showingStart">1</span>-<span id="showingEnd">10</span> out of <span id="totalEntries">0</span>
                </span>
                <div class="pagination-controls">
                    <button class="page-btn" id="prevBtn">
                        <i class='bx bx-chevron-left'></i>
                    </button>
                    <div class="page-input-wrap">
                        <input type="number" id="pageInput" value="1" min="1" />
                        <span>/ <span id="totalPages">1</span></span>
                    </div>
                    <button class="page-btn" id="nextBtn">
                        <i class='bx bx-chevron-right'></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- JavaScript -->
    <script type="module" src="js/a_sidebar.js"></script>
    <script src="js/a_accounts.js"></script>
</body>

</html>
