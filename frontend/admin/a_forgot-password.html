<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigate La Salle</title>
    <!-- Global style -->
    <link rel="stylesheet" href="../shared/css/root.css">
    <!-- Specific page style and other resources -->
    <link rel="stylesheet" href="css/a_forgot-password.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
</head>

<body>
    <div class="form-section">
        <div class="system-brand">
            <img src="img/a_logo.png">
            <span>Navigate La Salle</span>
        </div>
        <div class="header">
            <h1>Forgot your<br>Password?</h1>
            <p>Enter your email address and we'll send you a link to<br>reset your password.</p>
        </div>
        <form id="requestResetForm">
            <div class="input-field">
                <input type="email" id="email" placeholder="Email" />
            </div>
            <button type="submit" class="send-btn">Send Reset Link</button>
            <a href="a_login.html" class="back-link"><i class="bx bx-chevron-left"></i>Back to Login</a>
        </form>
    </div>
    
    <div class="image-section"></div>

    <!-- Modal -->
    <div class="modal-overlay hidden">
        <div class="modal" id="successModal">
            <div class="modal-icon">
                <svg viewBox="0 0 24 24" fill="none" width="24" height="24">
                    <path d="M5 13l4 4L19 7" stroke="var(--light-green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </div>
            <h2>Email Sent!</h2>
            <p>If an account with that email address exists, a password reset link has been sent.</p>
            <button class="close-btn">Close</button>
        </div>
    </div>

    <script src="js/a_forgot-password.js"></script>
</body>

</html>
