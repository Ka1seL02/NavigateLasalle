<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigate La Salle</title>
    <!-- Global Style -->
    <link rel="stylesheet" href="../shared/css/root.css">
    <!-- Specific Page Style -->
    <link rel="stylesheet" href="css/a_sidebar.css">
    <link rel="stylesheet" href="css/a_toast.css">
    <link rel="stylesheet" href="css/a_faq.css">
    <!-- Boxicons -->
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
</head>

<body>
    <div id="sidebar-container"></div>

    <main>
        <div class="page-header">
            <h1 class="page-title">FAQ</h1>
            <p class="page-subtitle">
                Manage frequently asked questions displayed on the kiosk.
            </p>
        </div>
        <div class="main-content">
            <button class="add-faq-btn" id="createNewFAQ">
                <i class='bx bx-plus'></i> Add New FAQ
            </button>

            <div class="faq-list" id="faqList">
                <!-- FAQ items will be generated here -->
            </div>
        </div>
    </main>

    <div class="modal-overlay hidden" id="modalOverlay">
        <!-- Create FAQ Modal -->
        <div class="modal hidden" id="createFAQModal">
            <div class="modal-icon">
                <svg viewBox="0 0 24 24" fill="none" width="24" height="24">
                    <path d="M12 5v14M5 12h14" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
            <h2>Create New FAQ</h2>
            <form id="createFAQForm">
                <input type="text" id="faqQuestion" placeholder="Enter the question" required />
                <textarea id="faqAnswer" placeholder="Enter the answer" rows="4" required></textarea>

                <div class="modal-actions">
                    <button type="button" class="cancel-btn" id="cancelCreateFaq">Cancel</button>
                    <button type="submit" class="submit-btn">Create FAQ</button>
                </div>
            </form>
        </div>
        <!-- Confirm Delete FAQ Modal -->
        <div class="modal hidden" id="confirmDeleteModal">
            <div class="modal-icon">
                <svg viewBox="0 0 24 24" fill="none" width="24" height="24">
                    <path
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                        stroke="var(--red)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </div>
            <h2>Delete FAQ?</h2>
            <p>Are you sure you want to delete this FAQ?</p>
            <div class="modal-actions">
                <button class="cancel-btn" id="cancelDeleteFAQ">Cancel</button>
                <button class="confirm-btn" id="confirmDeleteFAQ">Confirm</button>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script type="module" src="js/a_sidebar.js"></script>
    <script type="module" src="js/a_faq.js"></script>
</body>

</html>
