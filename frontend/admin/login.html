<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigate La Salle</title>
    <!-- Global styles -->
    <link rel="stylesheet" href="/shared/css/root.css">
    <link rel="stylesheet" href="/shared/css/loading.css">
    <!-- Specific page style and other resources -->
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
</head>

<body>
    <div class="form-section">
        <div class="form-content">
            <div class="brand">
                <img src="img/brand.png" alt="Navigate La Salle Logo">
                <span>Navigate La Salle</span>
            </div>

            <div class="login-header">
                <h1>Welcome<br>Back!</h1>
                <p>Sign in to your admin account to continue.</p>
            </div>

            <!-- Error box -->
            <div class="form-error hidden" id="formError">
                <p id="formErrorMsg"></p>
                <i class='bx bx-x' id="closeError"></i>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <input type="email" id="email" placeholder=" ">
                    <label for="email">Email</label>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder=" ">
                    <label for="password">Password</label>
                    <i class='bx bx-hide toggle-password' id="togglePassword"></i>
                </div>
                <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
                <button type="submit" class="login-btn">Login</button>
            </form>
        </div>
    </div>

    <div class="image-section"></div>

    <script type="module" src="js/login.js"></script>
</body>

</html>
