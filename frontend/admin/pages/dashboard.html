<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigate La Salle</title>
    <!-- Global style -->
    <link rel="stylesheet" href="/shared/css/root.css">
    <link rel="stylesheet" href="/shared/css/loading.css">
    <!-- Specific page style and other resources -->
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
</head>

<body>
    <div id="sidebar-container"></div>

    <main>
        <div class="page-header">
            <div class="page-header-left">
                <h1 class="page-title">Dashboard</h1>
                <p class="page-subtitle" id="dashboardGreeting">Welcome back!</p>
            </div>
            <div class="page-header-right">
                <p class="dashboard-date" id="dashboardDate"></p>
            </div>
        </div>

        <!-- Stat Cards -->
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-icon buildings">
                    <i class='bx bx-buildings'></i>
                </div>
                <div class="stat-info">
                    <p class="stat-label">Buildings</p>
                    <p class="stat-value" id="statBuildings">—</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon offices">
                    <i class='bx bx-briefcase'></i>
                </div>
                <div class="stat-info">
                    <p class="stat-label">Offices</p>
                    <p class="stat-value" id="statOffices">—</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon posts">
                    <i class='bx bx-news'></i>
                </div>
                <div class="stat-info">
                    <p class="stat-label">Posts</p>
                    <p class="stat-value" id="statPosts">—</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon faqs">
                    <i class='bx bx-question-mark'></i>
                </div>
                <div class="stat-info">
                    <p class="stat-label">FAQs</p>
                    <p class="stat-value" id="statFaqs">—</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon feedbacks">
                    <i class='bx bx-comment-detail'></i>
                </div>
                <div class="stat-info">
                    <p class="stat-label">Feedbacks</p>
                    <p class="stat-value" id="statFeedbacks">—</p>
                </div>
            </div>
            <div class="stat-card highlight">
                <div class="stat-icon unread">
                    <i class='bx bx-bell'></i>
                </div>
                <div class="stat-info">
                    <p class="stat-label">Unread Feedbacks</p>
                    <p class="stat-value" id="statUnread">—</p>
                </div>
            </div>
        </div>

        <!-- Middle Row -->
        <div class="dashboard-row">

            <!-- Posts Breakdown -->
            <div class="dashboard-card">
                <div class="dashboard-card-header">
                    <h2 class="dashboard-card-title">Posts Breakdown</h2>
                </div>
                <div class="posts-breakdown" id="postsBreakdown">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Feedback Summary -->
            <div class="dashboard-card">
                <div class="dashboard-card-header">
                    <h2 class="dashboard-card-title">Feedback Summary</h2>
                </div>
                <div class="feedback-summary" id="feedbackSummary">
                    <!-- Populated by JS -->
                </div>
            </div>

        </div>

        <!-- Bottom Row -->
        <div class="dashboard-row">

            <!-- Recent Posts -->
            <div class="dashboard-card">
                <div class="dashboard-card-header">
                    <h2 class="dashboard-card-title">Recent Posts</h2>
                    <a href="posts.html" class="dashboard-card-link">View all</a>
                </div>
                <div class="recent-list" id="recentPosts">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Recent Feedbacks -->
            <div class="dashboard-card">
                <div class="dashboard-card-header">
                    <h2 class="dashboard-card-title">Recent Feedbacks</h2>
                    <a href="feedbacks.html" class="dashboard-card-link">View all</a>
                </div>
                <div class="recent-list" id="recentFeedbacks">
                    <!-- Populated by JS -->
                </div>
            </div>

        </div>

    </main>

    <script type="module" src="js/sidebar.js"></script>
    <script type="module" src="js/dashboard.js"></script>
</body>

</html>
