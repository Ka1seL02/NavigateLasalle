<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigate La Salle</title>
    <!-- Global styles -->
    <link rel="stylesheet" href="/shared/css/root.css">
    <link rel="stylesheet" href="/shared/css/loading.css">
    <!-- Specific page style and other resources -->
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/faq.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
</head>

<body>
    <div id="sidebar-container"></div>

    <main>
        <div class="page-header">
            <h1 class="page-title">FAQ</h1>
            <p class="page-subtitle">
                Manage frequently asked questions displayed on the kiosk.
            </p>
        </div>
        <div class="main-content">
            <button class="create-faq" id="createNewFAQ">
                <i class='bx bx-message-add'></i> Add New FAQ
            </button>

            <div class="faq-list" id="faqList">
                <!-- FAQ items will be generated here -->
            </div>
        </div>
    </main>

    <!-- Create FAQ Modal -->
    <div class="modal-overlay hidden" id="createFaqModalOverlay">
        <div class="modal" id="createFaqModal">
            <div class="modal-header">
                <div class="modal-icon">
                    <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                        <path d="M12 5v14M5 12h14" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" />
                    </svg>
                </div>
                <h2>Add New FAQ</h2>
                <button class="close-btn" id="cancelCreate">
                    <i class='bx bx-x'></i>
                </button>
            </div>
            <div class="modal-form">
                <div class="modal-form-group">
                    <input type="text" id="newQuestion" placeholder=" " />
                    <label for="newQuestion">Question</label>
                </div>
                <div class="modal-form-group">
                    <textarea id="newAnswer" placeholder=" "></textarea>
                    <label for="newAnswer">Answer</label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="confirm-btn" id="confirmCreate">
                    <i class='bx bx-message-add'></i> Add FAQ
                </button>
            </div>
        </div>
    </div>

    <!-- Delete FAQ Modal -->
    <div class="modal-overlay hidden" id="deleteFaqModalOverlay">
        <div class="modal" id="deleteFaqModal">
            <div class="modal-header">
                <div class="modal-icon">
                    <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                        <path
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                            stroke="var(--red)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
                <h2>Delete FAQ</h2>
                <button class="close-btn" id="cancelDelete">
                    <i class='bx bx-x'></i>
                </button>
            </div>
            <p>Are you sure you want to delete this FAQ? This action cannot be undone.</p>
            <div class="modal-footer">
                <button class="delete-confirm-btn" id="confirmDelete">
                    <i class='bx bx-trash'></i> Delete
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="js/sidebar.js"></script>
    <script type="module" src="js/faq.js"></script>
</body>

</html>
