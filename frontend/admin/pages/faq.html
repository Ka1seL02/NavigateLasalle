<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigate La Salle</title>
    <!-- Global style -->
    <link rel="stylesheet" href="/shared/css/root.css">
    <link rel="stylesheet" href="/shared/css/loading.css">
    <!-- Specific page style and other resources -->
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/faq.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
</head>

<body>
    <div id="sidebar-container"></div>

    <main>
        <div class="page-header">
            <h1 class="page-title">FAQ</h1>
            <p class="page-subtitle">
                Manage frequently asked questions displayed on the kiosk.
            </p>
        </div>
        <div class="main-content">
            <button class="create-faq" id="createNewFAQ">
                <i class='bx bx-message-add'></i> Add New FAQ
            </button>

            <div class="faq-list" id="faqList">
                <!-- FAQ items will be generated here -->
            </div>
        </div>
    </main>

    <script type="module" src="js/sidebar.js"></script>
    <script type="module" src="js/faq.js"></script>

</html>
