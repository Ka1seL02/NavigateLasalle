<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigate La Salle</title>
    <!-- Global style -->
    <link rel="stylesheet" href="/shared/css/root.css">
    <link rel="stylesheet" href="/shared/css/loading.css">
    <!-- Specific page style and other resources -->
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/building-edit.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/quill@2.0.2/dist/quill.snow.css">
</head>

<body>
    <div id="sidebar-container"></div>

    <main>
        <div class="page-header">
            <div class="page-header-left">
                <a href="building.html" class="back-link">
                    <i class='bx bx-chevron-left'></i> Back to Buildings
                </a>
                <h1 class="page-title">Edit Building</h1>
            </div>
            <div class="page-actions">
                <button class="cancel-btn" id="cancelBtn">Cancel</button>
                <button class="save-btn" id="saveBtn">
                    <i class='bx bx-save'></i> Save Changes
                </button>
            </div>
        </div>

        <div class="main-content">
            <div class="form-layout">

                <!-- Left Column -->
                <div class="form-left">

                    <!-- Basic Info -->
                    <div class="form-card">
                        <h2 class="form-card-title">Basic Information</h2>

                        <div class="form-group">
                            <label for="name">Name <span class="required">*</span></label>
                            <input type="text" id="name" placeholder="e.g. Aklatang Emilio Aguinaldo" />
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="dataId">Building ID <span class="required">*</span></label>
                                <input type="text" id="dataId" placeholder="e.g. AEA" />
                            </div>
                            <div class="form-group">
                                <label for="category">Category <span class="required">*</span></label>
                                <select id="category">
                                    <option value="building">Building</option>
                                    <option value="facility">Facility</option>
                                    <option value="gate">Gate</option>
                                    <option value="landmark">Landmark</option>
                                    <option value="parking">Parking</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="isVisible">Status</label>
                            <div class="toggle-row">
                                <label class="switch">
                                    <input type="checkbox" id="isVisible" checked>
                                    <span class="slider"></span>
                                </label>
                                <span class="toggle-label" id="visibilityLabel">Open</span>
                            </div>
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="form-card">
                        <h2 class="form-card-title">Description</h2>
                        <div id="quillEditor"></div>
                    </div>

                </div>

                <!-- Right Column -->
                <div class="form-right">

                    <!-- Images -->
                    <div class="form-card">
                        <h2 class="form-card-title">Images</h2>
                        <p class="form-card-subtitle">Existing images — click X to remove</p>

                        <div class="existing-images" id="existingImages"></div>

                        <div class="upload-area" id="uploadArea">
                            <i class='bx bx-cloud-upload'></i>
                            <p>Click or drag to upload new images</p>
                            <span>JPG, PNG, WEBP up to 10MB</span>
                            <input type="file" id="imageInput" multiple accept="image/*" />
                        </div>

                        <div class="new-image-previews" id="newImagePreviews"></div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/quill@2.0.2/dist/quill.js"></script>
    <script type="module" src="js/sidebar.js"></script>
    <script type="module" src="js/building-edit.js"></script>
</body>

</html>
