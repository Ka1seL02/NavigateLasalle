<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigate La Salle</title>
    <!-- Global styles -->
    <link rel="icon" href="/shared/img/system_icon.png">
    <link rel="stylesheet" href="/shared/css/root.css">
    <link rel="stylesheet" href="/shared/css/loading.css">
    <!-- Specific page style and other resources -->
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/posts.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
</head>

<body>
    <div id="sidebar-container"></div>

    <main>
        <div class="page-header">
            <div class="page-header-left">
                <h1 class="page-title">Posts</h1>
                <p class="page-subtitle">Manage campus news, announcements, and events.</p>
            </div>
            <button class="add-btn" id="addPostBtn">
                <i class='bx bx-plus'></i> Add Post
            </button>
        </div>

        <div class="main-content">
            <!-- Search + Filters -->
            <div class="list-controls">
                <div class="search-bar">
                    <i class='bx bx-search'></i>
                    <input type="text" id="searchInput" placeholder="Search posts..." />
                </div>

                <select id="typeFilter" class="filter-select">
                    <option value="">All Types</option>
                    <option value="news">News</option>
                    <option value="announcement">Announcement</option>
                    <option value="event">Event</option>
                </select>

                <select id="officeFilter" class="filter-select">
                    <option value="">All Offices</option>
                    <option value="dlsud">DLSU-D</option>
                </select>

                <div class="date-toggle">
                    <button class="date-toggle-btn active" id="singleToggle">Single</button>
                    <button class="date-toggle-btn" id="rangeToggle">Range</button>
                </div>

                <div class="date-inputs" id="singleDateWrap">
                    <input type="date" id="singleDate" class="filter-date" />
                </div>

                <div class="date-inputs hidden" id="rangeDateWrap">
                    <input type="date" id="dateFrom" class="filter-date" />
                    <span class="date-sep">→</span>
                    <input type="date" id="dateTo" class="filter-date" />
                </div>

                <button class="clear-filters-btn hidden" id="clearFiltersBtn">
                    <i class='bx bx-x'></i> Clear
                </button>
            </div>

            <!-- Post List -->
            <div id="postList"></div>
        </div>
    </main>

    <!-- View Modal -->
    <div class="modal-overlay hidden" id="viewModalOverlay">
        <div class="view-modal">
            <button class="close-btn" id="closeViewModal">
                <i class='bx bx-x'></i>
            </button>

            <!-- Gallery -->
            <div class="modal-gallery" id="modalGallery">
                <div class="no-image">
                    <i class='bx bx-image'></i>
                    <p>No images available</p>
                </div>
            </div>

            <!-- Modal Body -->
            <div class="modal-body">
                <div class="modal-meta">
                    <span class="modal-type-badge" id="modalTypeBadge"></span>
                    <span class="modal-office-label" id="modalOfficeLabel"></span>
                    <span class="modal-date" id="modalDate"></span>
                </div>
                <h2 class="modal-name" id="modalName"></h2>
                <div class="modal-content-body" id="modalContent"></div>
            </div>

            <div class="modal-actions">
                <button class="edit-modal-btn" id="editModalBtn">
                    <i class='bx bx-edit'></i> Edit
                </button>
                <button class="delete-modal-btn" id="deleteModalBtn">
                    <i class='bx bx-trash'></i> Delete
                </button>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div class="modal-overlay hidden" id="deleteModalOverlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-icon">
                    <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                        <path
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                            stroke="var(--red)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
                <h2>Delete Post</h2>
                <button class="close-btn" id="cancelDelete">
                    <i class='bx bx-x'></i>
                </button>
            </div>
            <p>Are you sure you want to delete <strong id="deleteTargetName"></strong>? This action cannot be undone.
            </p>
            <div class="modal-footer">
                <button class="delete-confirm-btn" id="confirmDelete">
                    <i class='bx bx-trash'></i> Delete
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="js/sidebar.js"></script>
    <script type="module" src="js/posts.js"></script>
</body>

</html>
