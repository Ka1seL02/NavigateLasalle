<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigate La Salle</title>
    <!-- Global styles -->
    <link rel="icon" href="/shared/img/system_icon.png">
    <link rel="stylesheet" href="/shared/css/root.css">
    <link rel="stylesheet" href="/shared/css/loading.css">
    <!-- Specific page style and other resources -->
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/office.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
</head>

<body>
    <div id="sidebar-container"></div>

    <main>
        <div class="page-header">
            <div class="page-header-left">
                <h1 class="page-title">
                    Offices
                    <span class="page-count" id="officesCount">0</span>
                </h1>
                <p class="page-subtitle">Manage campus offices, departments, and colleges.</p>
            </div>
            <button class="add-btn" id="addOfficeBtn">
                <i class='bx bx-plus'></i> Add Office
            </button>
        </div>

        <div class="main-content">
            <!-- Search -->
            <div class="search-bar">
                <i class='bx bx-search'></i>
                <input type="text" id="searchInput" placeholder="Search offices..." />
            </div>

            <!-- Toolbar: Filter + View Toggle -->
            <div class="toolbar">
                <div class="list-category-wrap">
                    <button class="list-category-btn" id="listCategoryBtn">
                        <i class='bx bx-filter-alt'></i>
                        <span id="listCategoryLabel">All Categories</span>
                        <i class='bx bx-chevron-down list-category-chevron' id="listCategoryChevron"></i>
                    </button>
                    <div class="list-category-dropdown hidden" id="listCategoryDropdown">
                        <!-- Populated by JS -->
                    </div>
                </div>
                <div class="view-toggle">
                    <button class="view-btn active" id="viewCard" title="Card view">
                        <i class='bx bx-grid-alt'></i>
                    </button>
                    <button class="view-btn" id="viewList" title="List view">
                        <i class='bx bx-list-ul'></i>
                    </button>
                </div>
            </div>

            <!-- Office List -->
            <div id="officeList">
                <!-- Category sections generated here -->
            </div>
        </div>
    </main>

    <!-- View Modal -->
    <div class="modal-overlay hidden" id="viewModalOverlay">
        <div class="view-modal">
            <button class="close-btn" id="closeViewModal">
                <i class='bx bx-x'></i>
            </button>

            <!-- Gallery -->
            <div class="modal-gallery" id="modalGallery">
                <div class="no-image">
                    <i class='bx bx-building'></i>
                    <p>No images available</p>
                </div>
            </div>

            <!-- Modal Body -->
            <div class="modal-body">
                <div class="modal-meta">
                    <span class="modal-category" id="modalCategory"></span>
                    <span class="modal-visibility hidden" id="modalVisibility">Under Maintenance</span>
                </div>
                <h2 class="modal-name" id="modalName"></h2>
                <p class="modal-head" id="modalHead"></p>

                <!-- Info Grid -->
                <div class="modal-info-grid" id="modalInfoGrid"></div>

                <!-- Description -->
                <div class="modal-description" id="modalDescription"></div>

                <!-- Personnel -->
                <div class="modal-section hidden" id="modalPersonnelSection">
                    <h3 class="modal-section-title">Personnel</h3>
                    <div class="modal-personnel" id="modalPersonnel"></div>
                </div>

                <!-- Sub Offices -->
                <div class="modal-section hidden" id="modalSubOfficesSection">
                    <h3 class="modal-section-title">Offices Under This</h3>
                    <div class="modal-suboffices" id="modalSubOffices"></div>
                </div>

                <!-- Building -->
                <div class="modal-section hidden" id="modalBuildingSection">
                    <h3 class="modal-section-title">Located In</h3>
                    <p class="modal-building" id="modalBuilding"></p>
                </div>
            </div>

            <div class="modal-actions">
                <button class="edit-modal-btn" id="editModalBtn">
                    <i class='bx bx-edit'></i> Edit
                </button>
                <button class="delete-modal-btn" id="deleteModalBtn">
                    <i class='bx bx-trash'></i> Delete
                </button>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div class="modal-overlay hidden" id="deleteModalOverlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-icon">
                    <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                        <path
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                            stroke="var(--red)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
                <h2>Delete Office</h2>
                <button class="close-btn" id="cancelDelete">
                    <i class='bx bx-x'></i>
                </button>
            </div>
            <p>Are you sure you want to delete <strong id="deleteTargetName"></strong>? This action cannot be undone.</p>
            <div class="modal-footer">
                <button class="delete-confirm-btn" id="confirmDelete">
                    <i class='bx bx-trash'></i> Delete
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="js/sidebar.js"></script>
    <script type="module" src="js/office.js"></script>
</body>

</html>
